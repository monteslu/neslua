name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: install
        run: npm install
      - name: test
        run: npm test
      - name: golden-c byte-stability
        run: npm run golden
      - name: build every example to a .nes
        run: |
          set -e
          for ex in examples/*/main.lua; do
            echo "building $ex"
            node bin/neslua.js build "$ex" -o "${ex%/main.lua}/out.nes"
          done
