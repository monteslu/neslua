# neslua linker config - MMC1 (mapper 1, SNROM-style) + 8KB PRG-RAM at $6000.
#
# Why MMC1 and not bare NROM: luacretro games are built on static array()/pool()
# allocations, and NROM leaves only 512 bytes of BSS ($0300-$04FF) after the ZP,
# stack, shadow-OAM and C parameter stack. That is not a game. MMC1 maps 8KB of
# (battery-backed) PRG-RAM at $6000-$7FFF, so BSS + the game's arrays live there
# (WRAM, 8KB) while the hot globals + C stack stay in fast internal RAM.
#
# Layout:
#   $0002-$001B  ZP  (cc65 runtime reserves $00-$01; our zp asm + fastcall slots)
#   $0200-$02FF  shadow OAM (NMI DMAs it every frame)
#   $0300-$04FF  internal RAM: DATA (initialised globals, run here from ROM)
#   $0500-$05FF  reserved (music-driver scratch if a cart uses sfx)
#   $0600-$07FF  cc65 C parameter stack (grows down from $0800)
#   $6000-$7FFF  PRG-RAM (WRAM): BSS + game arrays (8KB, battery-backed)
#   $8000-$FFFF  PRG-ROM: 32KB fixed (MMC1 32KB mode; banking is M4)

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0200;   # C param stack = 2 pages
}
MEMORY {
    # cc65 reserves $00-$01; the rest of the zero page ($02-$FF) is ours. The
    # SDK uses a lot of zp: the fastcall slots (nes_a*/nes_p*), the camera + pad
    # words, and the fixed-point asm scratch (_fa/_fb/aa/bb/pr/...). 254 bytes.
    ZP:     file = "", start = $0002, size = $00FE, type = rw, define = yes;

    # 16-byte iNES header (provided by the crt0's HEADER segment).
    HEADER: file = %O, start = $0000, size = $0010, fill = yes;

    # PRG-ROM: 2 x 16K = 32K. MMC1 maps the last 16K fixed at $C000 and a
    # switchable 16K at $8000; in 32K mode both halves are one fixed bank.
    ROM0:   file = %O, start = $8000, size = $7FFA, fill = yes, define = yes;
    ROMV:   file = %O, start = $FFFA, size = $0006, fill = yes;

    # Shadow OAM at $0200 (page 2). NMI DMAs it to PPU OAM via $4014.
    OAM:    file = "", start = $0200, size = $0100;

    # Internal RAM available to DATA (initialised globals copied from ROM).
    RAM:    file = "", start = $0300, size = $0200, define = yes;

    # Music-driver scratch page (only touched when a cart uses sfx).
    SNDRAM: file = "", start = $0500, size = $0100, define = yes;

    # cc65 C parameter stack: $0600-$07FF (2 pages, grows down from $0800).
    SRAM:   file = "", start = $0600, size = __STACKSIZE__, define = yes;

    # PRG-RAM at $6000-$7FFF: BSS + the game's static array()/pool() storage.
    # THIS is why neslua is MMC1: 8KB of real RAM instead of NROM's 512 bytes.
    WRAM:   file = "", start = $6000, size = $2000, define = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP,              type = zp;
    HEADER:   load = HEADER,          type = ro;
    STARTUP:  load = ROM0,            type = ro,  define   = yes;
    LOWCODE:  load = ROM0,            type = ro,  optional = yes;
    ONCE:     load = ROM0,            type = ro,  optional = yes;
    CODE:     load = ROM0,            type = ro,  define   = yes;
    RODATA:   load = ROM0,            type = ro,  define   = yes;
    DATA:     load = ROM0, run = RAM, type = rw,  define   = yes;
    VECTORS:  load = ROMV,            type = rw;
    BSS:      load = WRAM,            type = bss, define   = yes;
    OAM:      load = OAM,             type = bss, optional = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
